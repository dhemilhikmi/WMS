version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: workshop_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshop_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: workshop_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/workshop_system
      API_PORT: 3000
      NODE_ENV: development
      JWT_SECRET: dev-secret-key
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/src:/app/api/src
    command: npm run dev

  web:
    build:
      context: web
      dockerfile: Dockerfile
    container_name: workshop_web
    ports:
      - "3001:3001"
    environment:
      REACT_APP_API_URL: http://localhost:3000
    depends_on:
      - api
    volumes:
      - ./web/src:/app/src

volumes:
  postgres_data:
